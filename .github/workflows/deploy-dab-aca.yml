name: Deploy DAB to Azure Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AZURE_CLIENT_ID: ed126750-5930-4b42-ae1f-67af7f1110f5
  AZURE_TENANT_ID: be945e7a-2e17-4b44-926f-512e85873eec
  AZURE_SUBSCRIPTION_ID: 6a3bb170-5159-4bff-860b-aa74fb762697
  AZURE_RESOURCE_GROUP: rg-dab-aca-mcp-auth-demo
  ACR_NAME: acrdabmcpkwcm0e
  CONTAINER_APP_NAME: ca-dabmcp-kwcm0e
  IMAGE_REPOSITORY: dab-aca-mcp-demo
  DOCKERFILE_PATH: samples/azure/container-apps-entra-mcp/Dockerfile
  BUILD_CONTEXT: .

jobs:
  build-and-deploy:
    name: Build image and update ACA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve image name
        id: image
        shell: bash
        run: |
          set -euo pipefail
          login_server="$(az acr show --name "$ACR_NAME" --resource-group "$AZURE_RESOURCE_GROUP" --query loginServer -o tsv)"
          tag="${GITHUB_SHA::12}"
          image="$login_server/$IMAGE_REPOSITORY:$tag"
          {
            echo "login-server=$login_server"
            echo "tag=$tag"
            echo "image=$image"
          } >> "$GITHUB_OUTPUT"

      - name: Login to ACR
        shell: bash
        run: az acr login --name "$ACR_NAME" --resource-group "$AZURE_RESOURCE_GROUP"

      - name: Build image
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            --file "$DOCKERFILE_PATH" \
            --tag "${{ steps.image.outputs.image }}" \
            "$BUILD_CONTEXT"

      - name: Push image
        shell: bash
        run: docker push "${{ steps.image.outputs.image }}"

      - name: Update Container App image
        shell: bash
        run: |
          set -euo pipefail
          az containerapp update \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --image "${{ steps.image.outputs.image }}" \
            --set-env-vars "DEPLOYMENT_VERSION=${{ steps.image.outputs.tag }}"

      - name: Verify Container App revision
        shell: bash
        run: |
          set -euo pipefail
          for attempt in {1..30}; do
            latest="$(az containerapp show \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --query properties.latestRevisionName -o tsv)"
            ready="$(az containerapp show \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --query properties.latestReadyRevisionName -o tsv)"
            status="$(az containerapp show \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --query properties.runningStatus -o tsv)"

            echo "attempt=$attempt latest=$latest ready=$ready status=$status"

            if [[ "$latest" == "$ready" && "$status" == "Running" ]]; then
              fqdn="$(az containerapp show \
                --name "$CONTAINER_APP_NAME" \
                --resource-group "$AZURE_RESOURCE_GROUP" \
                --query properties.configuration.ingress.fqdn -o tsv)"
              echo "Container App is ready: https://$fqdn"
              exit 0
            fi

            sleep 10
          done

          echo "Container App revision did not become ready in time." >&2
          az containerapp revision list \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query "[].{name:name,active:properties.active,trafficWeight:properties.trafficWeight,healthState:properties.healthState,provisioningState:properties.provisioningState}" \
            -o table
          exit 1
